# ArgoCD Application — paprika (backend + frontend)
#
# 이 파일은 "git에 올려두기만" 해서는 아무 일도 일어나지 않는다.
# ArgoCD가 인식하려면 클러스터에 한 번 적용해야 한다:
#   kubectl apply -f argocd/paprika-application.yaml
#
# 적용 후에도 syncPolicy.automated가 꺼져 있어 "수동 sync"다.
#   - ArgoCD UI에서 Sync 버튼, 또는: argocd app sync paprika
# 동작을 확인한 뒤, 아래 automated 블록 주석을 풀면 "main 커밋 → 자동 배포"가 된다.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: paprika
  namespace: argocd            # ArgoCD가 Application을 감시하는 네임스페이스
spec:
  project: default             # 기본 AppProject (없으면 환경에 맞게 변경)

  source:
    repoURL: https://github.com/hyun326/lion_first.git
    targetRevision: main       # 워크플로가 이미지 태그를 커밋하는 브랜치
    path: k8s                  # paprika-backend.yaml / paprika-frontend.yaml 위치

  destination:
    server: https://kubernetes.default.svc   # ArgoCD와 같은 클러스터(in-cluster)
    namespace: likelion-project              # 배포 대상 네임스페이스 (이미 존재)

  syncPolicy:
    # 자동 배포 활성화됨 — main에 새 커밋이 들어오면 ArgoCD가 자동으로 sync.
    automated:
      prune: true      # git에서 삭제된 리소스는 클러스터에서도 제거
      selfHeal: true   # 수동 변경을 git 상태로 되돌림
    syncOptions:
      - CreateNamespace=false  # likelion-project는 이미 있으므로 생성 안 함
