spring:
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false

# ── Security 개발 모드 해제 ─────────────────────────────────
security:
  dev-mode: false

# ── OAuth2 성공 후 프론트 리다이렉트 URI (prod) ─────────────
oauth2:
  redirect-uri: ${OAUTH2_REDIRECT_URI:https://paprika.coder-han.com/oauth2/callback}

logging:
  level:
    com.paprika: INFO
