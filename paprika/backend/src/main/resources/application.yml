spring:
  application:
    name: paprika

  profiles:
    active: dev  # 배포 시 SPRING_PROFILES_ACTIVE=prod 환경변수로 오버라이드

  # ── Database ──────────────────────────────────────────────
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/likelion?sslmode=require
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # ── OAuth2 소셜 로그인 ────────────────────────────────────
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope: profile, email
            redirect-uri: ${OAUTH2_CALLBACK_BASE_URL:http://localhost:8080}/login/oauth2/code/google
          naver:
            client-id: ${NAVER_CLIENT_ID}
            client-secret: ${NAVER_CLIENT_SECRET}
            authorization-grant-type: authorization_code
            redirect-uri: ${OAUTH2_CALLBACK_BASE_URL:http://localhost:8080}/login/oauth2/code/naver
            scope: name, email, profile_image
          github:
            client-id: ${GITHUB_CLIENT_ID_PROD}
            client-secret: ${GITHUB_CLIENT_SECRET}
            scope: user:email, read:user
            redirect-uri: ${OAUTH2_CALLBACK_BASE_URL:http://localhost:8080}/login/oauth2/code/github
        provider:
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response

  # ── 이메일 (비밀번호 재설정) ──────────────────────────────
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  # ── 파일 업로드 ───────────────────────────────────────────
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 20MB

# ── JWT ────────────────────────────────────────────────────
jwt:
  secret: ${JWT_SECRET:paprika-dev-secret-key-please-change-in-production}
  access-token-expiry: 3600000     # 1시간 (ms)
  refresh-token-expiry: 604800000  # 7일 (ms)

# ── OAuth2 성공 후 프론트 리다이렉트 URI ────────────────────
oauth2:
  redirect-uri: ${OAUTH2_REDIRECT_URI:http://localhost:3000/oauth2/callback}

# ── Cloudinary (이미지 업로드) ─────────────────────────────
cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME}
  api-key: ${CLOUDINARY_API_KEY}
  api-secret: ${CLOUDINARY_API_SECRET}

# ── Security 개발 모드 (true = 모든 요청 허용) ───────────────
security:
  dev-mode: true

server:
  port: 8080

logging:
  level:
    com.paprika: DEBUG
