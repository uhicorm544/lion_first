spring:
  datasource:
    url: jdbc:h2:mem:paprika;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop  # 앱 시작 시 테이블 생성, 종료 시 삭제
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: true

  h2:
    console:
      enabled: true          # http://localhost:8080/h2-console 에서 DB 직접 확인 가능
      path: /h2-console

  # OAuth2 클라이언트 키 없어도 시작되도록 비활성화
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: dummy
            client-secret: dummy
          naver:
            client-id: dummy
            client-secret: dummy
          github:
            client-id: dummy
            client-secret: dummy

cloudinary:
  cloud-name: dummy
  api-key: dummy
  api-secret: dummy

security:
  dev-mode: true
